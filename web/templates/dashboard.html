<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestCycle 宏观周期</title>
    <link rel="stylesheet" href="/static/style.css?v=20260708-score-history-row-1" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body data-page="dashboard">
    <div data-myinvest-header></div>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">MyInvestCycle</p>
          <h1>A股宏观周期总览</h1>
        </div>
        <button class="refresh-button" id="refreshButton" type="button">刷新</button>
      </header>

      <nav class="channel-nav-section" aria-label="频道导航">
        <a class="is-active" href="/">
          <span>Macro</span>
          <strong>宏观总览</strong>
        </a>
        <a href="/cycle-track">
          <span>Current Cycle</span>
          <strong>本轮周期</strong>
        </a>
        <a href="/cycle-observation">
          <span>Long Cycle</span>
          <strong>长期牛熊</strong>
        </a>
        <a href="/risk-execution">
          <span>Risk</span>
          <strong>风控执行</strong>
        </a>
        <a href="/strategies">
          <span>Strategies</span>
          <strong>策略回测</strong>
        </a>
        <a href="/validation">
          <span>Validation</span>
          <strong>验证归因</strong>
        </a>
        <a href="/api-docs">
          <span>API</span>
          <strong>接口说明</strong>
        </a>
      </nav>

      <section class="status-grid" aria-live="polite">
        <article class="regime-panel" id="regimePanel">
          <div class="panel-label">短期风控状态</div>
          <div class="regime-name" id="regimeName">--</div>
          <div class="as-of" id="asOf">--</div>
        </article>
        <article class="metric-panel">
          <div class="panel-label">短期置信度</div>
          <div class="metric-value" id="confidenceValue">--</div>
        </article>
        <article class="metric-panel">
          <div class="panel-label">短期综合分</div>
          <div class="metric-value" id="regimeScoreValue">--</div>
        </article>
        <article class="metric-panel">
          <div class="panel-label">数据基准日</div>
          <div class="metric-value metric-date" id="dataAsOfValue">--</div>
        </article>
      </section>
      <p class="context-note" id="regimeContextNote">--</p>

      <section class="channel-section" id="cycle-channel">
        <div class="dashboard-section-heading">
          <div>
            <span>Macro Cycle</span>
            <h2>长期主周期判断</h2>
          </div>
          <p>首页把短期风控温度、长期主周期和四维评分分开显示，避免把不同模型口径混成一个牛熊结论。</p>
        </div>

        <section class="cycle-score-row">
          <section class="cycle-panel" aria-live="polite">
            <div class="cycle-cell cycle-state-cell">
              <div class="panel-label">长期阶段定位</div>
              <div class="cycle-title" id="cycleTitle">--</div>
            </div>
            <div class="cycle-cell">
              <span>开始</span>
              <strong id="cycleStart">--</strong>
            </div>
            <div class="cycle-cell">
              <span>结束</span>
              <strong id="cycleEnd">--</strong>
            </div>
            <div class="cycle-cell">
              <span>当前位置</span>
              <strong id="cyclePosition">--</strong>
            </div>
          </section>

          <article class="chart-panel radar-panel">
            <div class="panel-heading">
              <h2 class="help-title" tabindex="0" data-help="从本轮牛市起点开始观察趋势、宽度、流动性和波动稳定性评分。灰线是上证指数收盘价背景，帮助判断评分变化发生在指数什么位置。">本轮四维评分走势</h2>
            </div>
            <div class="compact-scores" id="scoreList"></div>
            <div class="chart-box score-history-box" id="scoreHistoryChart"></div>
            <p class="result-note" id="scoreHistoryNote">--</p>
          </article>
        </section>

      </section>
    </main>
    <div data-myinvest-footer></div>

    <script src="/static/charts.js?v=20260708-score-history-row-1"></script>
    <script src="/static/dashboard.js?v=20260708-score-history-row-1"></script>
    <script src="https://invest.okbbc.com/header.js" data-target="[data-myinvest-header]"></script>
    <script src="https://invest.okbbc.com/footer.js" data-target="[data-myinvest-footer]"></script>
  </body>
</html>
