<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvestCycle Regime</title>
    <link rel="stylesheet" href="/static/style.css?v=20260625-cycle-ui-4" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <div data-myinvest-header></div>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">MyInvestCycle</p>
          <h1>A股牛熊周期状态</h1>
        </div>
        <button class="refresh-button" id="refreshButton" type="button">刷新</button>
      </header>

      <section class="status-grid" aria-live="polite">
        <article class="regime-panel" id="regimePanel">
          <div class="panel-label">当前状态</div>
          <div class="regime-name" id="regimeName">--</div>
          <div class="as-of" id="asOf">--</div>
        </article>
        <article class="metric-panel">
          <div class="panel-label">置信度</div>
          <div class="metric-value" id="confidenceValue">--</div>
        </article>
        <article class="metric-panel">
          <div class="panel-label">综合分</div>
          <div class="metric-value" id="regimeScoreValue">--</div>
        </article>
        <article class="metric-panel compact-scores" id="scoreList"></article>
      </section>

      <section class="cycle-panel" aria-live="polite">
        <div>
          <div class="panel-label">当前阶段定位</div>
          <div class="cycle-title" id="cycleTitle">--</div>
        </div>
        <div class="cycle-grid">
          <div>
            <span>开始</span>
            <strong id="cycleStart">--</strong>
          </div>
          <div>
            <span>结束</span>
            <strong id="cycleEnd">--</strong>
          </div>
          <div>
            <span>当前位置</span>
            <strong id="cyclePosition">--</strong>
          </div>
        </div>
      </section>

      <section class="visual-grid">
        <article class="chart-panel radar-panel">
          <div class="panel-heading">
            <h2>四维评分</h2>
          </div>
          <div class="chart-box" id="radarChart"></div>
        </article>
        <article class="chart-panel index-panel">
          <div class="panel-heading">
            <h2>长期牛熊周期观察</h2>
          </div>
          <div class="chart-box" id="indexChart"></div>
        </article>
        <article class="chart-panel focus-panel">
          <div class="panel-heading">
            <h2>本轮周期跟踪与概率展望</h2>
            <span class="panel-kicker" id="trackRange">--</span>
          </div>
          <div class="focus-layout">
            <div class="chart-box xlarge" id="cycleTrackChart"></div>
            <aside class="forecast-panel">
              <div class="forecast-head">
                <span>未来 <strong id="forecastHorizon">--</strong> 交易日</span>
                <em id="forecastSample">--</em>
              </div>
              <div class="prob-list">
                <div class="prob-row">
                  <div><span>牛市延续</span><strong id="probContinue">--</strong></div>
                  <div class="prob-track"><i id="barContinue"></i></div>
                </div>
                <div class="prob-row">
                  <div><span>震荡整理</span><strong id="probRange">--</strong></div>
                  <div class="prob-track"><i id="barRange"></i></div>
                </div>
                <div class="prob-row">
                  <div><span>转弱确认</span><strong id="probWeaken">--</strong></div>
                  <div class="prob-track"><i id="barWeaken"></i></div>
                </div>
              </div>
              <div class="projection-list" id="projectionList"></div>
              <div class="key-levels" id="keyLevels"></div>
            </aside>
          </div>
        </article>
      </section>
    </main>
    <div data-myinvest-footer></div>

    <script src="/static/charts.js?v=20260625-cycle-ui-4"></script>
    <script src="/static/dashboard.js?v=20260625-cycle-ui-4"></script>
    <script src="https://invest.okbbc.com/header.js" data-target="[data-myinvest-header]"></script>
    <script src="https://invest.okbbc.com/footer.js" data-target="[data-myinvest-footer]"></script>
  </body>
</html>
